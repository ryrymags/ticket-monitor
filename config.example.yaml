# =============================================================================
# Ticket Monitor — Example Configuration
# =============================================================================
# Copy this file to config.yaml and fill in your details.
# Or just use the GUI (run app.py) — it writes config.yaml for you!
# =============================================================================

# ── Discord notifications ──────────────────────────────────────────────────
discord:
  webhook_url: "YOUR_WEBHOOK_URL_HERE"      # Required — paste your Discord webhook URL
  username: "Ticket Monitor"                 # The bot name shown in Discord
  ping_user_id: ""                           # Your Discord user ID for @mentions (optional)

# ── ntfy.sh push notifications (optional) ──────────────────────────────────
# A second channel so friends get phone pushes without Discord. They install the
# free ntfy app and subscribe to your topic (no account needed). Only ticket
# alerts fan out here, throttled to match Discord's @-mention burst (no spam).
ntfy:
  enabled: false                             # Set true to turn on phone pushes
  topic: "bingo-tix-CHANGE-ME"               # UNGUESSABLE name — anyone who knows it can read alerts
  priority: "high"                           # urgent/high/default/low/min
  # "Open in Safari" button uses the plain event URL; the notification BODY tap uses
  # this deep link to open the Ticketmaster APP on the event (AppsFlyer OneLink —
  # {url_encoded} is the percent-encoded event URL). Leave blank to disable the deep link.
  app_deep_link: "https://ticketmaster.onelink.me/7u25/edpUS?deep_link_value={url_encoded}&af_force_deeplink=true&is_retargeting=true"

# ── Events to monitor ─────────────────────────────────────────────────────
# Add one entry per event. Paste the full Ticketmaster URL.
events:
  - event_id: "REPLACE_WITH_EVENT_ID"        # The ID in the Ticketmaster URL (e.g. /event/01006...)
    name: "My Concert (Night 1)"
    date: "2030-01-01"
    url: "https://www.ticketmaster.com/your-event-url-here"

  # Add more events here:
  # - event_id: "..."
  #   name: "My Concert (Night 2)"
  #   date: "2030-01-02"
  #   url: "https://www.ticketmaster.com/..."

# ── BINGO configs / ticket preferences ────────────────────────────────────
# Define one or more categories of ideal tickets.
#
# BINGO (🟢 green) fires when ALL three criteria are met:
#   1. count >= min_tickets  (adjacent seats in the same section/row/price)
#   2. price <= max_price_per_ticket
#   3. section is in preferred_sections  (only when preferred_sections is non-empty)
#
# The first matching config in this list wins, so put your favorite category
# first. Orange (🟡) alerts fire when tickets appear but don't fully meet criteria.
bingo_configs:
  - name: "LOGE pairs"                 # Shown in Discord when this BINGO matches
    min_tickets: 2                     # Minimum adjacent tickets in same section/row/price group
    max_price_per_ticket: 250.0        # Maximum face value per ticket (USD)

    # Section names from the Ticketmaster seating chart, e.g. [LOGE, FLOOR, PIT]
    # Leave as [] to accept any section (section won't affect BINGO).
    preferred_sections: ["LOGE"]

    # When true: you'll ONLY receive alerts for preferred sections (suppresses orange alerts).
    # When false (recommended): also send 🟡 orange alerts for other sections.
    require_preferred_only: false

    # When true: send 🟡 orange alerts even when tickets don't meet all criteria.
    alert_on_any_availability: true

  - name: "Budget triples"
    min_tickets: 3
    max_price_per_ticket: 125.0
    preferred_sections: []
    require_preferred_only: false
    alert_on_any_availability: true

# Legacy single-config block. The GUI keeps this synced to the first item in
# bingo_configs for backward compatibility.
preferences:
  name: "LOGE pairs"
  min_tickets: 2                     # Minimum adjacent tickets in same section/row/price group
  max_price_per_ticket: 250.0        # Maximum face value per ticket (USD)

  # Section names from the Ticketmaster seating chart, e.g. [LOGE, FLOOR, PIT]
  # Check the event page for the exact abbreviations used for your venue.
  # Leave as [] to accept any section (section won't affect BINGO).
  preferred_sections: ["LOGE"]

  # When true: you'll ONLY receive alerts for preferred sections (suppresses orange alerts).
  # When false (recommended): also send 🟡 orange alerts for other sections,
  #   so you can see what's available and tune your preferences via the History tab.
  require_preferred_only: false

  # When true: send 🟡 orange alerts even when tickets don't meet all criteria.
  # All appearances are logged to ticket_history.json for calibration.
  alert_on_any_availability: true

# ── Browser settings ─────────────────────────────────────────────────────
# Most users won't need to change these.
browser:
  session_mode: "persistent_profile"   # Recommended: persistent_profile
  user_data_dir: "secrets/tm_profile"  # Where your login session is stored
  storage_state_path: "secrets/tm_storage_state.json"
  channel: "chrome"                     # "" = bundled Chromium (works on all PCs)
                                        # "chrome" = use system Google Chrome (better bot-evasion; falls back to Chromium if not installed)
  per_event_scheduler_enabled: true     # true = check one due event per wake; false = legacy all-event cycles
  per_event_poll_min_seconds: 45        # Each event gets its own randomized next-due time
  per_event_poll_max_seconds: 105
  per_event_min_gap_between_checks_seconds: 20
  event_weights:                        # Soft priority; higher weight gets earlier randomized due times
    "EXAMPLEEVENT0001": 2               # primary example weight
    "EXAMPLEEVENT0002": 1               # secondary example weight
  poll_min_seconds: 12                  # Legacy cycle-mode fallback when per_event_scheduler_enabled=false
  poll_max_seconds: 24
  headless: true
  reuse_event_tabs: true
  single_event_page: true               # Reuse one active event tab and navigate it between events
  event_dwell_min_seconds: 3            # Post-load dwell before reading the page
  event_dwell_max_seconds: 8
  homepage_warmup_interval_seconds: 1800
  poll_interval_seconds: 12
  poll_jitter_seconds: 2
  event_stagger_seconds: 6
  navigation_timeout_seconds: 20
  challenge_threshold: 5
  challenge_retry_seconds: 60
  challenge_cooldown_base_seconds: 60
  challenge_cooldown_max_seconds: 300
  challenge_cooldown_escalate_after: 6
  challenge_cooldown_tiers_seconds: [300, 900, 1800]
  challenge_cooldown_tier_every: 3
  cdp_endpoint_url: "http://127.0.0.1:9222"
  cdp_connect_timeout_seconds: 10
  # Adaptive cadence: poll near the floor when healthy, multiply the interval on
  # each blocked/challenged cycle (up to adaptive_max_seconds), decay back when healthy.
  adaptive_backoff_enabled: true        # false = old behavior (fixed challenge_retry_seconds on block)
  adaptive_backoff_multiplier: 2.0      # interval ×= this on a blocked cycle
  adaptive_recover_factor: 0.5          # interval ×= this on a healthy cycle (toward the floor)
  adaptive_max_seconds: 300             # cap on the backed-off interval
  # Stealth: look like a normal returning Chrome user (no UA spoofing — real Chrome's UA is genuine).
  stealth_enabled: true                 # false = no init script / context options
  locale: "en-US"
  timezone_id: "America/New_York"

browser_host:
  enabled: false
  chrome_executable_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
  user_data_dir: "secrets/tm_chrome_profile"
  remote_debugging_port: 9222

# ── Alert tuning ──────────────────────────────────────────────────────────
alerts:
  ticket_cooldown_seconds: 180      # Minimum seconds between repeat ticket alerts
  operational_heartbeat_hours: 6    # How often to log a health summary (log-only)
  event_check_stale_seconds: 180
  operational_state_cooldown_seconds: 1800
  non_bingo_enabled: false          # Alert for non-BINGO ("not a match") availability. Off = BINGO-only.
  manual_action_after_seconds: 900  # Only ping you for manual action after this long stuck (self-heal failed)
  operational_to_discord: false     # Routine self-heal messages: false = log only, true = post to Discord

# ── Polling & retry ───────────────────────────────────────────────────────
polling:
  timezone: "US/Eastern"
  backoff_multiplier: 2.0
  max_backoff_seconds: 120

# ── Self-healing ──────────────────────────────────────────────────────────
self_heal:
  browser_restart_threshold: 3
  browser_restart_window_seconds: 600
  process_restart_threshold: 6
  process_restart_window_seconds: 1800
  error_alert_cooldown_seconds: 1800

# ── Ticketmaster auto-login (advanced / macOS only) ───────────────────────
auth:
  auto_login_enabled: false
  keychain_service: "ticket-monitor"
  keychain_email_account: "ticketmaster-email"
  keychain_password_account: "ticketmaster-password"
  max_auto_login_attempts_per_hour: 3
  auto_login_cooldown_seconds: 1800
  session_health_check_interval_seconds: 3600
  session_health_check_url: "https://www.ticketmaster.com/my-account"
  session_recheck_base_seconds: 120
  session_recheck_max_seconds: 900
  session_logout_confirmations_required: 2

# ── Watchdog ──────────────────────────────────────────────────────────────
watchdog:
  enabled: true
  interval_seconds: 120
  stale_after_seconds: 180
  max_fix_attempts_per_hour: 6

# ── Auto-reload on code changes ───────────────────────────────────────────
updates:
  enabled: true
  interval_seconds: 60
  stability_delay_seconds: 20
  watch_globs:
    - "monitor.py"
    - "src/**/*.py"
    - "config.yaml"
    - "requirements.txt"
    - "pyproject.toml"

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  file: "logs/monitor.log"
  max_file_size_mb: 10
  backup_count: 3
