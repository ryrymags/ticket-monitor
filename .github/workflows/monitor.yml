name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest ruff

      - name: Run lint
        run: ruff check src tests --select E,F --ignore E501,F401

      - name: Run tests
        run: pytest tests/ -v
